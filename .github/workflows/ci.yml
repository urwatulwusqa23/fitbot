name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        working-directory: backend
        run: dotnet restore FitBot_Project.sln

      - name: Build
        working-directory: backend
        run: dotnet build FitBot_Project.sln --no-restore --configuration Release

      - name: Test
        working-directory: backend
        run: dotnet test FitBot_Project.sln --no-build --configuration Release
        continue-on-error: true # remove once test projects exist

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (via CRA build step)
        run: CI=true npm run build

      - name: Test
        run: CI=true npm test -- --watchAll=false
